<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background - White -->
  <rect width="512" height="512" rx="115" fill="#ffffff"/>

  <!-- Four squares pattern - larger, more spacing, thicker lines -->
  <!-- Square size: 110x110, Gap: 48px, Total: 268px -->
  <!-- Starting position: (512-268)/2 = 122px -->
  <g transform="translate(122, 122)">
    <!-- Top left - solid square -->
    <rect x="0" y="0" width="110" height="110" rx="26" fill="#0a0a0a"/>

    <!-- Top right - outline square -->
    <rect x="158" y="0" width="110" height="110" rx="26" stroke="#0a0a0a" stroke-width="8" fill="none"/>

    <!-- Bottom left - outline square -->
    <rect x="0" y="158" width="110" height="110" rx="26" stroke="#0a0a0a" stroke-width="8" fill="none"/>

    <!-- Bottom right - solid square -->
    <rect x="158" y="158" width="110" height="110" rx="26" fill="#0a0a0a"/>

    <!-- Flow connection lines - dashed, thicker -->
    <path d="M110 55L158 55M110 213L158 213M55 110L55 158M213 110L213 158"
          stroke="#0a0a0a"
          stroke-width="6"
          stroke-linecap="round"
          stroke-dasharray="8 8"/>
  </g>
</svg>
